<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feed The Skyeto</title>
    <!-- PHẦN 1: TÔ MÀU VÀ CHỈNH BỐ CỤC (CSS) -->
    <style>
        body {
            background-color: #f0f0f0; /* Màu nền xám nhạt cho đỡ mỏi mắt */
            display: flex; /* Bật chế độ flex cho cả trang */
            flex-direction: column; /* Sắp xếp các phần tử từ trên xuống dưới */
            align-items: center; /* Căn giữa mọi thứ theo chiều ngang */
            min-height: 100vh; /* Chiều cao ít nhất bằng màn hình */
            margin: 0;
            padding: 20px;
            font-family: sans-serif; /* Font chữ dễ đọc */
        }

        h1 {
            color: #333; /* Màu chữ tiêu đề */
        }
    </style>
</head>
<body>

    <!-- PHẦN 2: NỘI DUNG CHÍNH (HTML) -->
    <h1>Welcome to Feed The Skyeto!</h1>

    <!-- 👇 --- DÁN MẢNH GHÉP 1 VÀO ĐÂY --- 👇 -->
    <div class="skyeto-container" style="display: flex; justify-content: flex-end; width: 100%; max-width: 800px; padding: 20px;">
        <!-- Hình ảnh Skyeto (tạm thời) -->
        <img src="https://picsum.photos/200" alt="Skyeto" style="width: 200px; height: auto;">
    </div>
    <!-- 👆 --- HẾT MẢNH GHÉP 1 --- 👆 -->

</body>
</html>
